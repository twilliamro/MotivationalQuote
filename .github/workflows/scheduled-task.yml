name: frequently-running-task

on:
  schedule:
    - cron: '0 9 * * *'
    - cron: '0 11 * * *'
    - cron: '0 13 * * *'
    - cron: '0 15 * * *'

  # This adds a "Run workflow" button so you can test manually
  workflow_dispatch:

  
jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

      - name: Run script
        env:
          # Your secrets are available as environment variables
          # Add more secrets in Settings > Secrets > Actions
          MY_EMAIL: ${{ secrets.MY_EMAIL }}
          MY_PASSWORD: ${{ secrets.MY_PASSWORD }}
          TO_ADDRS: ${{ secrets.TO_ADDRS }}
        run: python main.py
